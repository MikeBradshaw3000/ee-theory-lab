# Phase 4B Tier 3 Pre-Registration: reg_01_scale_interactions
# Interaction family: IF5 (Scale interactions)
# Outcome: O2 (logit(p_base))
# Per Phase 4B Specification v1.1, Section 4.4
#
# Schema is the contract-mediated intake format consumed by _phase_4b_intake.py
# (normalize_prereg). Interpretation_boundary content, excluded_variables
# rationales, and uncertainty/interaction notes are preserved as schema-extension
# fields; the intake module ignores them. The derived_variables block declares
# the per-run/tick constructions for Local_Density_squared, rho_global, and
# psi_global. The epoch variable is sourced via attach_tier2_globals from
# phase_4b/tier2_outputs/global_timeseries.csv, matching the configuration under
# which the original regression was run.

prereg_id: "reg_01_scale_interactions"
prereg_version: "1.0"
model_family: "ols"
formula_role: "authoritative"
formula: "logit_p_base ~ Lambda_total + Local_Density + Local_Density_squared + Term_Lambda + Term_Density_Pos + Term_Overcrowding + Psi_local + b_i_v + b_i_u + b_i_r + F_variant + scale + epoch + scale*F_variant + scale*rho_global + scale*psi_global"

canonical_input_filenames:
  - "flight6_probe1_overcrowding_20x20.parquet"
  - "flight6_probe1_overcrowding_40x40.parquet"
  - "flight6_probe2_starvation_FLR_20x20.parquet"
  - "flight6_probe2_starvation_FLR_40x40.parquet"

tier2_globals_path: "phase_4b/tier2_outputs/global_timeseries.csv"

outcome:
  name: "logit_p_base"
  construction: "eta_floor_inversion_of_p_base"
  eta: 0.01
  construction_notes: |
    p_base = (p_act - eta) / (1 - eta)
    logit_p_base = log(p_base / (1 - p_base))
    Per Phase 4B spec Section 4.1 O2. Inverts the nucleation floor to recover
    p_base, the sigmoid output before the floor. Modeling logit(p_base) yields
    logit(p_base) = Drive_Raw, mapping directly to the cascade equation.

predictors:
  - Lambda_total
  - Local_Density
  - Local_Density_squared
  - Term_Lambda
  - Term_Density_Pos
  - Term_Overcrowding
  - Psi_local
  - b_i_v
  - b_i_u
  - b_i_r
  - F_variant
  - scale
  - epoch

interactions:
  - "scale:F_variant"
  - "scale:rho_global"
  - "scale:psi_global"

interaction_family: "IF5"
interaction_family_name: "Scale interactions"
interaction_notes: |
  Core IF5 family per Phase 4B spec Section 4.2. No sensitivity-version
  extensions. rho_global and psi_global computed as per-tick population
  means of is_active and Psi_local respectively (declared in derived_variables
  below). The 'scale*' notation in the formula expands to main effects plus
  interaction in statsmodels; the interactions list above declares the
  interaction terms specifically for intake-contract validation.

derived_variables:
  Local_Density_squared: "square_of_local_density"
  rho_global: "groupwise_mean_is_active_by_run_and_tick"
  psi_global: "groupwise_mean_psi_local_by_run_and_tick"

excluded_variables:
  - "p_act"
  - "p_base"
  - "Drive_Raw"
  - "PRNG_draw"
  - "Delta_v"
  - "Delta_u"
  - "Delta_r"

excluded_variables_rationales:
  p_act: |
    Part of outcome construction; including would cause perfect collinearity.
  p_base: |
    Identical to outcome before logit transformation; including would cause
    perfect collinearity.
  Drive_Raw: |
    Drive_Raw equals logit(p_base) by substrate definition (Phase 4B spec
    V4 verifies this). Including Drive_Raw as predictor of logit(p_base)
    is tautological. The point of regressing logit(p_base) on decomposed
    drive components is to recover the decomposition empirically; including
    the recomposed Drive_Raw defeats that purpose.
  PRNG_draw: |
    Realization-level random variable; carries no structural information
    about activation dynamics. Per Phase 4B spec Section 4.1 O2
    (logit(p_base) is pre-realization), inclusion is meaningless for this
    outcome.
  Delta_v: |
    Q update; affects bases at t+1 but logit(p_base) at t is fully
    determined by t-state predictors. Including would be temporally
    misaligned.
  Delta_u: |
    Same as Delta_v.
  Delta_r: |
    Same as Delta_v.

uncertainty_method:
  primary: "cluster_robust"
  cluster_variable: "run_x_tick"
  sensitivity:
    - "cell"
  notes: |
    Four runs provide weak run-level clustering. Tick-level clustering within
    run is more meaningful for population aggregates per Section 4.3. Cluster
    counts at run x tick are large (12000 levels); cluster-robust SEs are
    reliable. Cell-level clustering reported as sensitivity per Phase 4B spec
    Section 4.3, checks cell-level persistence.

interpretation_boundary:
  licenses: |
    1. Quantification of F-form main effect on logit(p_base) at the cellular
       level, controlling for density pathway, base structure, Psi_local, and
       epoch.
    2. Quantification of scale main effect on logit(p_base) at the cellular
       level, similarly controlled.
    3. Test of scale-stability of F-form effect via the scale x F_variant
       interaction term: small/null interaction supports scale-stable
       characterization (yesterday's Tier 2 cross-scale verdict).
    4. Test of scale-dependence of population-level density (rho_global) and
       coherence (psi_global) effects via scale x rho_global and scale x
       psi_global.
    5. Two-field classification of each estimated effect per Phase 4B spec
       Section 6.

  does_not_adjudicate: |
    1. Architectural selection of F_LR vs F_2_symmetric for Open Element 14.
       Per Phase 4B spec Section 6.4: F-form selection is structural_status =
       open_element_not_resolved regardless of regression results.
    2. Finite-size scaling functional form. Two scales is insufficient per
       Section 5.3; this is outside_phase_4b_scope.
    3. PRNG-realization variance. Matched-seed design; this is
       requires_additional_probe (Flight 3a-style).
    4. Causal interpretation of any coefficient. Per Phase 4B spec Section
       4.6: Tier 3 describes statistical structure in the Flight 2 record;
       the record was produced by known mechanisms, so coefficient signs
       trace to mechanisms by construction, not by causal inference.
